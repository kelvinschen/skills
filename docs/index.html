<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive demos for the kelvinschen skills collection.">
  <title>Skills Demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      color-scheme: light;
      --paper: #faf9f6;
      --ink: #1f1f1f;
      --graphite: #5a5a5a;
      --slate: #dcdad5;
      --signal: #b84545;
      --frost: #fff;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
    }
    main {
      width: min(760px, calc(100% - 3rem));
      margin: 0 auto;
      padding: 6rem 0;
    }
    .eyebrow {
      margin: 0 0 1rem;
      color: var(--signal);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-family: "DM Serif Display", Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 400;
      line-height: 1;
    }
    .intro {
      max-width: 530px;
      margin: 1.25rem 0 3rem;
      color: var(--graphite);
      font-size: 1rem;
      line-height: 1.7;
    }
    .demo {
      display: block;
      padding: 1.5rem;
      border: 1px solid var(--slate);
      border-radius: 10px;
      background: var(--frost);
      color: inherit;
      text-decoration: none;
      transition: border-color 160ms ease, transform 160ms ease;
    }
    .demo:hover, .demo:focus-visible {
      border-color: var(--signal);
      transform: translateY(-2px);
    }
    .demo-meta {
      color: var(--signal);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h2 {
      margin: 0.45rem 0;
      font-family: "DM Serif Display", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
    }
    .demo p {
      margin: 0;
      color: var(--graphite);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .route {
      display: inline-block;
      margin-top: 1rem;
      color: var(--graphite);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
    }
    @media (prefers-reduced-motion: reduce) {
      .demo { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">kelvinschen / skills</p>
    <h1>Skills Demos</h1>
    <p class="intro">Small, inspectable examples showing what each skill produces in practice.</p>
    <a class="demo" href="./grill-with-tree/">
      <span class="demo-meta">Decision design</span>
      <h2>Grill with Tree</h2>
      <p>An English decision log for the acpus workflow-install design, with four decision packs and a resolved tree.</p>
      <span class="route">/skills/grill-with-tree/ →</span>
    </a>
  </main>
</body>
</html>
